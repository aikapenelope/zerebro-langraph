# Zerebro — docker compose up and go.
#
# 1. Copy .env.example to .env and fill in your keys
# 2. docker compose up --build
# 3. Open http://localhost:3000
#    - Deployment URL: http://localhost:2024
#    - Assistant ID: cerebro

services:
  # Python backend: LangGraph dev server with the cerebro agent
  backend:
    build: .
    ports:
      - "2024:2024"
    env_file:
      - .env
    volumes:
      # Persist agent configs across restarts
      - agent-data:/app/src/cerebro/agents/configs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2024/ok')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Next.js frontend: deep-agents-ui
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agent-data:
