# Zerebro — docker compose up and go.
#
# 1. Copy .env.example to .env and fill in your keys
# 2. docker compose up --build
# 3. Open http://localhost:3000
#    - Deployment URL: http://localhost:2024
#    - Assistant ID: cerebro

services:
  # Python backend: LangGraph dev server with the cerebro agent
  backend:
    build: .
    ports:
      - "2024:2024"
    env_file:
      - .env
    environment:
      # MCP servers running on the host need host.docker.internal
      - MCP_N8N_URL=${MCP_N8N_URL:-http://host.docker.internal:5678/mcp}
      - MCP_REMOTION_URL=${MCP_REMOTION_URL:-http://host.docker.internal:3100/mcp}
      - MCP_GRAFITI_URL=${MCP_GRAFITI_URL:-http://host.docker.internal:8001/mcp}
      - MCP_MEM0_URL=${MCP_MEM0_URL:-http://host.docker.internal:8002/mcp}
    volumes:
      # Persist agent configs across restarts
      - agent-data:/app/src/cerebro/agents/configs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2024/ok')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Next.js frontend: deep-agents-ui
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      # Pre-fill the LangSmith API key so the UI settings dialog has it ready
      - NEXT_PUBLIC_LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agent-data:
